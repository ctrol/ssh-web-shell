<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSH Web Shell</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/css/addon-fit.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"></polyline>
            <line x1="12" y1="19" x2="20" y2="19"></line>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">SSH Web Shell</span>
          <span class="brand-tagline">网页版 SSH 终端</span>
        </div>
      </div>

      <div class="header-actions">
        <div id="connBadge" class="conn-badge">
          <span id="statusDot" class="status-dot off"></span>
          <span id="statusText">未连接</span>
        </div>
        <button id="disconnectBtn" class="btn btn-danger" disabled>断开连接</button>
      </div>
    </header>

    <!-- ── Main ── -->
    <main class="main">

      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">
            <h2>连接配置</h2>
          </div>
        </div>

        <div class="sidebar-body">
          <form id="loginForm">

            <!-- Server Info -->
            <div class="form-section">
              <div class="form-section-title">服务器信息</div>

              <div class="form-row">
                <label for="host">主机地址</label>
                <input type="text" id="host" placeholder="192.168.1.100" required />
              </div>

              <div class="form-row">
                <label for="port">端口</label>
                <input type="number" id="port" value="22" min="1" max="65535" required />
              </div>

              <div class="form-row">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="root" required />
              </div>
            </div>

            <!-- Auth Type -->
            <div class="form-section">
              <div class="form-section-title">认证方式</div>

              <div class="auth-tabs">
                <button type="button" class="auth-tab active" data-auth="password">密码认证</button>
                <button type="button" class="auth-tab" data-auth="key">私钥登录</button>
              </div>

              <!-- Password fields -->
              <div id="fieldPassword" class="field">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="输入 SSH 密码" />
              </div>

              <!-- Private key fields -->
              <div id="fieldKey" class="hidden">
                <div class="field" style="margin-bottom:8px">
                  <label for="privateKey">私钥内容（PEM 格式）</label>
                  <textarea id="privateKey" rows="6" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----&#10;...&#10;-----END OPENSSH PRIVATE KEY-----"></textarea>
                </div>
                <div class="field">
                  <label for="passphrase">私钥密码（如有加密）</label>
                  <input type="password" id="passphrase" placeholder="选填" />
                </div>
              </div>
            </div>

            <!-- Connect button -->
            <button type="submit" id="connectBtn" class="btn btn-primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
              </svg>
              连接服务器
            </button>

            <!-- Tip -->
            <div class="tip">
              <div class="tip-title">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="8" x2="12" y2="12"></line>
                  <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                安全提示
              </div>
              请确保运行本服务的主机可以访问目标 SSH 服务器。<br />
              所有连接信息仅在本地处理，不会上传到任何第三方。
            </div>
          </form>
        </div>
      </aside>

      <!-- Terminal Section -->
      <section class="terminal-section">
        <div class="terminal-header">
          <div class="terminal-dots">
            <span class="terminal-dot red"></span>
            <span class="terminal-dot yellow"></span>
            <span class="terminal-dot green"></span>
          </div>
          <span class="terminal-title" id="terminalTitle">SSH Terminal</span>
          <div class="terminal-actions">
            <button id="expandSidebarBtn" class="btn btn-icon" title="显示连接面板" style="display:none">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
              </svg>
            </button>
          </div>
        </div>
        <div class="terminal-wrap">
          <div id="terminal" class="terminal"></div>
        </div>
      </section>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/addon-web-links.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
